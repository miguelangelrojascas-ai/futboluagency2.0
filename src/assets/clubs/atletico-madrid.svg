<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <!-- Shield outline -->
  <path d="M50 4 L92 14 L92 60 C92 88 72 108 50 116 C28 108 8 88 8 60 L8 14 Z"
        fill="#ffffff" stroke="#0a2e6e" stroke-width="3"/>
  <!-- Red and white stripes -->
  <defs>
    <clipPath id="shieldClip">
      <path d="M50 7 L89 16 L89 60 C89 86 70 105 50 113 C30 105 11 86 11 60 L11 16 Z"/>
    </clipPath>
  </defs>
  <g clip-path="url(#shieldClip)">
    <rect x="11" y="7" width="11.14" height="106" fill="#ce3524"/>
    <rect x="22.14" y="7" width="11.14" height="106" fill="#ffffff"/>
    <rect x="33.28" y="7" width="11.14" height="106" fill="#ce3524"/>
    <rect x="44.42" y="7" width="11.14" height="106" fill="#ffffff"/>
    <rect x="55.56" y="7" width="11.14" height="106" fill="#ce3524"/>
    <rect x="66.7" y="7" width="11.14" height="106" fill="#ffffff"/>
    <rect x="77.84" y="7" width="11.14" height="106" fill="#ce3524"/>
    <!-- Blue top band -->
    <rect x="11" y="7" width="78" height="32" fill="#0a2e6e"/>
    <!-- Bear and tree (simplified silhouette) -->
    <g fill="#ffffff" transform="translate(50 23)">
      <!-- Tree trunk -->
      <rect x="6" y="-4" width="3" height="14"/>
      <!-- Tree foliage -->
      <circle cx="11" cy="-2" r="6"/>
      <circle cx="14" cy="2" r="5"/>
      <!-- Bear body -->
      <ellipse cx="-4" cy="6" rx="9" ry="4.5"/>
      <!-- Bear head -->
      <circle cx="-12" cy="2" r="3.5"/>
      <!-- Bear ear -->
      <circle cx="-14" cy="-1" r="1.4"/>
      <!-- Front legs (rearing up against tree) -->
      <rect x="2" y="-2" width="2.5" height="8" rx="1"/>
      <rect x="-1" y="-1" width="2.5" height="7" rx="1"/>
      <!-- Back legs -->
      <rect x="-8" y="9" width="2.5" height="4"/>
      <rect x="-3" y="9" width="2.5" height="4"/>
    </g>
    <!-- Stars -->
    <g fill="#ffd700">
      <polygon points="20,12 21,15 24,15 21.5,17 22.5,20 20,18 17.5,20 18.5,17 16,15 19,15"/>
      <polygon points="50,12 51,15 54,15 51.5,17 52.5,20 50,18 47.5,20 48.5,17 46,15 49,15"/>
      <polygon points="80,12 81,15 84,15 81.5,17 82.5,20 80,18 77.5,20 78.5,17 76,15 79,15"/>
    </g>
  </g>
</svg>
