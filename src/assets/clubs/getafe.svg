<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <!-- Shield -->
  <path d="M50 4 L92 14 L92 60 C92 88 72 108 50 116 C28 108 8 88 8 60 L8 14 Z"
        fill="#003a70" stroke="#003a70" stroke-width="3"/>
  <!-- Inner border -->
  <path d="M50 10 L86 18 L86 60 C86 84 68 102 50 109 C32 102 14 84 14 60 L14 18 Z"
        fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <!-- White vertical band center -->
  <rect x="42" y="10" width="16" height="100" fill="#ffffff"/>
  <!-- Blue stripes on white band edges (azulón signature) -->
  <rect x="42" y="10" width="2" height="100" fill="#003a70"/>
  <rect x="56" y="10" width="2" height="100" fill="#003a70"/>
  <!-- Letters G C F stacked on white band -->
  <text x="50" y="42" text-anchor="middle" font-family="Georgia, serif" font-weight="bold" font-size="18" fill="#003a70">G</text>
  <text x="50" y="62" text-anchor="middle" font-family="Georgia, serif" font-weight="bold" font-size="18" fill="#003a70">C</text>
  <text x="50" y="82" text-anchor="middle" font-family="Georgia, serif" font-weight="bold" font-size="18" fill="#003a70">F</text>
  <!-- Crown on top -->
  <g transform="translate(50 18)" fill="#ffd700" stroke="#003a70" stroke-width="0.5">
    <path d="M-10 0 L-7 -5 L-3 -2 L0 -7 L3 -2 L7 -5 L10 0 Z"/>
    <rect x="-10" y="0" width="20" height="3"/>
    <circle cx="-7" cy="-5" r="1.2" fill="#ce3524"/>
    <circle cx="0" cy="-7" r="1.2" fill="#ce3524"/>
    <circle cx="7" cy="-5" r="1.2" fill="#ce3524"/>
  </g>
  <!-- Founding year -->
  <text x="50" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="6" fill="#003a70">1983</text>
</svg>
